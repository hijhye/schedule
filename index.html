<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>개인 일정관리</title>
    <style>
      @import url("https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css");

      :root {
        --bg: #f5f7fc;
        --surface: rgba(255, 255, 255, 0.92);
        --surface-solid: #ffffff;
        --text: #25283a;
        --muted: #858ba3;
        --line: #e5e8f2;
        --line-strong: #d8ddeb;

        --primary: #7a78e8;
        --primary-dark: #6260cf;
        --primary-soft: #f0efff;

        --work: #3188cf;
        --work-soft: #eaf6ff;

        --personal: #8475d9;
        --personal-soft: #f0edff;

        --loind: #45a9b8;
        --loind-soft: #e9f8fa;

        --danger: #d35e72;
        --shadow: 0 10px 30px rgba(84, 91, 146, 0.08);
        --header-shadow: 0 14px 34px rgba(37, 49, 95, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        color: var(--text);
        background: radial-gradient(
            circle at 15% 5%,
            rgba(169, 211, 255, 0.3),
            transparent 26%
          ),
          radial-gradient(
            circle at 88% 4%,
            rgba(200, 190, 255, 0.24),
            transparent 24%
          ),
          linear-gradient(180deg, #f8faff 0%, var(--bg) 50%, #f6f7fb 100%);
        font-family: "SUIT", "Pretendard", "Apple SD Gothic Neo", sans-serif;
        letter-spacing: -0.02em;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }
      button {
        border: 0;
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
      }

      .app-header {
        position: fixed;
        left: 22px;
        right: 22px;
        top: 12px;
        z-index: 50;
        height: 68px;
        padding: 0 26px 0 30px;
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr) 48px;
        align-items: center;
        gap: 24px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid rgba(224, 228, 238, 0.92);
        border-radius: 34px;
        box-shadow: 0 7px 24px rgba(43, 52, 78, 0.08);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        transition: transform 0.28s ease, opacity 0.22s ease,
          box-shadow 0.2s ease;
      }

      .app-header.header-hidden {
        transform: translateY(calc(-100% - 22px));
        opacity: 0;
      }

      .app-header.header-solid {
        box-shadow: 0 9px 28px rgba(43, 52, 78, 0.11);
      }

      .wordmark {
        color: #151821;
        text-decoration: none;
        font-size: 21px;
        font-weight: 900;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .top-nav {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(26px, 5vw, 72px);
        min-width: 0;
      }

      .top-nav button {
        position: relative;
        padding: 24px 0 22px;
        background: transparent;
        color: #4d5260;
        font-size: 13px;
        font-weight: 800;
        white-space: nowrap;
        transition: color 0.18s ease;
      }

      .top-nav button::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: 14px;
        width: 0;
        height: 2px;
        border-radius: 999px;
        background: linear-gradient(90deg, #83bdf4, #8c7de7);
        transform: translateX(-50%);
        transition: width 0.18s ease;
      }

      .top-nav button:hover {
        color: #232837;
      }

      .top-nav button.active {
        color: #202431;
      }

      .top-nav button.active::after {
        width: 100%;
      }

      .header-action {
        width: 38px;
        height: 38px;
        justify-self: end;
        display: grid;
        place-items: center;
        border-radius: 50%;
        background: transparent;
        color: #151821;
        transition: background 0.16s ease;
      }

      .header-action:hover {
        background: #f0f2f7;
      }

      .header-dots {
        display: grid;
        grid-template-columns: repeat(3, 4px);
        gap: 4px;
      }

      .header-dots span {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: currentColor;
        display: block;
      }

      .main {
        width: min(1480px, 100%);
        margin: 0 auto;
        padding: 102px 36px 46px;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 22px;
      }

      .topbar h1 {
        margin: 0 0 6px;
        font-size: 29px;
        font-weight: 900;
        letter-spacing: -0.05em;
      }

      .today-text {
        color: var(--muted);
        font-size: 12px;
      }

      .add-btn {
        padding: 12px 17px;
        border-radius: 10px;
        background: linear-gradient(135deg, #77aef5, #8175e3);
        color: #fff;
        font-size: 13px;
        font-weight: 850;
        box-shadow: 0 8px 18px rgba(109, 111, 207, 0.2);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }

      .add-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 11px 23px rgba(109, 111, 207, 0.26);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .summary-card {
        position: relative;
        overflow: hidden;
        padding: 17px 18px;
        background: var(--surface);
        border: 1px solid rgba(229, 232, 242, 0.95);
        border-radius: 14px;
        box-shadow: var(--shadow);
      }

      .summary-card::after {
        content: "";
        position: absolute;
        right: -24px;
        top: -24px;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: rgba(142, 181, 245, 0.1);
      }

      .summary-card:nth-child(2)::after {
        background: rgba(112, 193, 235, 0.12);
      }
      .summary-card:nth-child(3)::after {
        background: rgba(157, 137, 234, 0.12);
      }
      .summary-card:nth-child(4)::after {
        background: rgba(88, 190, 198, 0.12);
      }

      .summary-card span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
      }

      .summary-value {
        margin-top: 7px;
        font-size: 24px;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .summary-card small {
        margin-left: 3px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 700;
      }

      .dashboard {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 350px;
        gap: 18px;
        align-items: start;
      }

      .card {
        background: var(--surface);
        border: 1px solid rgba(226, 230, 241, 0.95);
        border-radius: 16px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .calendar-card {
        padding: 20px;
        min-width: 0;
      }

      .calendar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        margin-bottom: 15px;
      }

      .calendar-head h2 {
        margin: 0;
        font-size: 19px;
        font-weight: 900;
        letter-spacing: -0.035em;
      }

      .month-control {
        display: flex;
        gap: 5px;
      }

      .icon-btn,
      .today-btn {
        height: 33px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        transition: 0.15s ease;
      }

      .icon-btn:hover,
      .today-btn:hover {
        border-color: #cfd4ec;
        background: #f7f7ff;
        color: var(--primary-dark);
      }

      .icon-btn {
        width: 33px;
        font-size: 16px;
      }
      .today-btn {
        padding: 0 11px;
        font-size: 11px;
        font-weight: 850;
      }

      .weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .weekday {
        padding: 8px 4px 10px;
        text-align: center;
        color: var(--muted);
        font-size: 10px;
        font-weight: 850;
      }

      .weekday:first-child {
        color: #d36b82;
      }
      .weekday:last-child {
        color: #4e8dcc;
      }

      .day {
        min-height: 112px;
        padding: 8px;
        border-top: 1px solid var(--line);
        border-right: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        overflow: hidden;
        transition: background 0.15s ease;
      }

      .day:nth-child(7n + 1) {
        border-left: 1px solid var(--line);
      }
      .day:nth-last-child(-n + 7) {
        border-bottom: 1px solid var(--line);
      }
      .day.outside {
        background: rgba(248, 249, 252, 0.8);
        color: #bcc1cf;
      }
      .day.selected {
        background: #f3f2ff;
      }
      .day:hover {
        background: #f8faff;
      }

      .day-number {
        width: 25px;
        height: 25px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        font-size: 11px;
        font-weight: 850;
      }

      .day.today .day-number {
        background: linear-gradient(145deg, #7eb8f4, #8177e4);
        color: #fff;
        box-shadow: 0 4px 10px rgba(113, 116, 211, 0.2);
      }

      .day-events {
        display: grid;
        gap: 4px;
        margin-top: 6px;
      }

      .calendar-event {
        width: 100%;
        padding: 5px 6px;
        border-radius: 6px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: left;
        font-size: 9px;
        font-weight: 850;
      }

      .calendar-event.work {
        color: var(--work);
        background: var(--work-soft);
      }
      .calendar-event.personal {
        color: var(--personal);
        background: var(--personal-soft);
      }
      .calendar-event.loind {
        color: var(--loind);
        background: var(--loind-soft);
      }

      .more-count {
        padding-left: 3px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 700;
      }

      .right-column {
        display: grid;
        gap: 15px;
        position: sticky;
        top: 102px;
      }

      .list-card {
        padding: 18px;
      }

      .list-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 13px;
      }

      .list-title h3 {
        margin: 0;
        font-size: 15px;
        font-weight: 900;
      }

      .list-title span {
        color: var(--muted);
        font-size: 10px;
        font-weight: 750;
      }

      .schedule-list {
        display: grid;
        gap: 8px;
      }

      .schedule-item {
        position: relative;
        padding: 12px 34px 12px 13px;
        border: 1px solid var(--line);
        border-radius: 11px;
        background: rgba(255, 255, 255, 0.92);
        transition: 0.15s ease;
      }

      .schedule-item:hover {
        border-color: #d4d8eb;
        transform: translateY(-1px);
        box-shadow: 0 5px 14px rgba(94, 100, 157, 0.07);
      }

      .schedule-item.overdue {
        background: #fff7f8;
        border-color: #f0d7de;
      }

      .schedule-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 700;
      }

      .type-chip {
        padding: 3px 7px;
        border-radius: 999px;
        font-size: 8px;
        font-weight: 900;
      }

      .type-chip.work {
        color: var(--work);
        background: var(--work-soft);
      }
      .type-chip.personal {
        color: var(--personal);
        background: var(--personal-soft);
      }
      .type-chip.loind {
        color: var(--loind);
        background: var(--loind-soft);
      }

      .schedule-name {
        font-size: 12px;
        font-weight: 850;
        line-height: 1.4;
      }

      .delete-mini {
        position: absolute;
        top: 10px;
        right: 8px;
        width: 23px;
        height: 23px;
        border-radius: 6px;
        color: #abb0bf;
        background: transparent;
        font-size: 14px;
      }

      .delete-mini:hover {
        color: var(--danger);
        background: #fff0f3;
      }

      .empty {
        padding: 21px 8px;
        color: var(--muted);
        text-align: center;
        font-size: 11px;
        line-height: 1.6;
      }

      .focus-card {
        padding: 18px;
        background: linear-gradient(
          145deg,
          rgba(245, 247, 255, 0.98),
          rgba(240, 244, 255, 0.94)
        );
        color: var(--text);
      }

      .focus-card h3 {
        margin: 0 0 6px;
        font-size: 14px;
        font-weight: 900;
      }
      .focus-card p {
        margin: 0;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.5;
      }

      .focus-progress {
        height: 7px;
        margin: 14px 0 8px;
        border-radius: 999px;
        overflow: hidden;
        background: #e7e9f4;
      }

      .focus-progress > div {
        height: 100%;
        background: linear-gradient(90deg, #79baf1, #8578e2);
        border-radius: inherit;
      }

      .focus-info {
        display: flex;
        justify-content: space-between;
        color: var(--muted);
        font-size: 9px;
        font-weight: 750;
      }

      .modal-wrap {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(44, 46, 72, 0.34);
        backdrop-filter: blur(6px);
      }

      .modal-wrap.open {
        display: grid;
      }

      .modal {
        width: min(500px, 100%);
        max-height: calc(100vh - 40px);
        overflow-y: auto;
        padding: 24px;
        border-radius: 17px;
        background: #fff;
        border: 1px solid var(--line);
        box-shadow: 0 24px 65px rgba(65, 69, 118, 0.18);
      }

      .modal-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 19px;
      }

      .modal-head h2 {
        margin: 0;
        font-size: 19px;
        font-weight: 900;
      }

      .close-btn {
        width: 31px;
        height: 31px;
        border-radius: 8px;
        background: #f2f3f8;
        color: #767c90;
        font-size: 17px;
      }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 6px;
      }
      .field.full {
        grid-column: 1 / -1;
      }

      .field label {
        color: #62687a;
        font-size: 10px;
        font-weight: 850;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        padding: 11px 12px;
        border: 1px solid var(--line);
        border-radius: 9px;
        outline: none;
        background: #fff;
        color: var(--text);
      }

      .field textarea {
        min-height: 84px;
        resize: vertical;
      }

      .field input:focus,
      .field select:focus,
      .field textarea:focus {
        border-color: #aaa8ed;
        box-shadow: 0 0 0 3px rgba(126, 120, 229, 0.1);
      }

      .form-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 19px;
      }

      .cancel-btn,
      .save-btn {
        padding: 10px 16px;
        border-radius: 8px;
        font-weight: 850;
      }

      .cancel-btn {
        color: #70768a;
        background: #f0f1f5;
      }
      .save-btn {
        color: #fff;
        background: linear-gradient(135deg, #77aef5, #8175e3);
      }

      @media (max-width: 1180px) {
        .app-header {
          grid-template-columns: 160px minmax(0, 1fr) 44px;
          padding: 0 20px 0 24px;
        }

        .top-nav {
          gap: clamp(18px, 3.5vw, 42px);
        }

        .top-nav button {
          font-size: 12px;
        }
      }

      @media (max-width: 1080px) {
        .dashboard {
          grid-template-columns: 1fr;
        }
        .right-column {
          position: static;
          grid-template-columns: 1fr 1fr;
        }
        .focus-card {
          grid-column: 1 / -1;
        }
      }

      @media (max-width: 860px) {
        .app-header {
          left: 12px;
          right: 12px;
          top: 10px;
          height: 62px;
          grid-template-columns: 1fr auto;
          padding: 0 14px 0 20px;
          border-radius: 31px;
        }

        .wordmark {
          font-size: 18px;
        }

        .top-nav {
          display: none;
        }

        .main {
          padding-top: 92px;
        }
      }

      @media (max-width: 720px) {
        .main {
          padding: 90px 12px 30px;
        }
        .topbar {
          align-items: flex-start;
        }
        .topbar h1 {
          font-size: 25px;
        }
        .summary-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 8px;
        }
        .dashboard {
          grid-template-columns: 1fr;
        }
        .right-column {
          grid-template-columns: 1fr;
        }
        .calendar-card {
          padding: 13px 7px;
        }
        .day {
          min-height: 74px;
          padding: 4px 3px;
        }
        .calendar-event {
          height: 6px;
          padding: 0;
          font-size: 0;
        }
        .form-grid {
          grid-template-columns: 1fr;
        }
        .field.full {
          grid-column: auto;
        }
      }
    </style>

  <body>
    <div class="app">
      <header class="app-header">
        <a class="wordmark" href="#" aria-label="Schedule 홈">SCHEDULE</a>

        <nav class="top-nav" aria-label="일정 구분">

        <div class="header-account">

          <article class="summary-card">

          <article class="summary-card">

              <div class="weekday">수</div>

              <div class="focus-progress"><div id="progressBar"></div></div>

    <div class="modal-wrap" id="modalWrap">
      <div class="modal">
        <div class="modal-head">
          <h2 id="modalTitle">새 일정 등록</h2>
          <button class="close-btn" id="closeModalBtn">×</button>
        </div>

        <form id="scheduleForm">
          <input type="hidden" id="scheduleId" />
          <div class="form-grid">
            <div class="field full">
              <label for="title">일정명</label>
              <input
                id="title"
                required
                maxlength="60"
                placeholder="예: 대전 행사 현장 운영"
              />
            </div>

            <div class="field">
              <label for="type">구분</label>
              <select id="type">
                <option value="work">캐스트피아 일정</option>
                <option value="personal">개인일정</option>
                <option value="loind">로인드일정</option>
              </select>
            </div>

            <div class="field">
              <label for="status">상태</label>
              <select id="status">
                <option value="planned">예정</option>
                <option value="progress">진행 중</option>
                <option value="done">완료</option>
              </select>
            </div>

            <div class="field">
              <label for="startDate">시작일</label>
              <input id="startDate" type="date" required />
            </div>

            <div class="field">
              <label for="endDate">종료일 / 마감일</label>
              <input id="endDate" type="date" required />
            </div>

            <div class="field">
              <label for="startTime">시작 시간</label>
              <input id="startTime" type="time" />
            </div>

            <div class="field">
              <label for="location">장소</label>
              <input id="location" placeholder="예: 코엑스 B홀" />
            </div>

            <div class="field full">
              <label for="memo">메모</label>
              <textarea
                id="memo"
                placeholder="준비물, 작업 단계, 담당자 연락처 등을 적어두세요."
              ></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="cancel-btn" id="cancelBtn">
              취소
            </button>
            <button type="submit" class="save-btn">저장하기</button>
          </div>
        </form>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        doc,
        setDoc,
        deleteDoc,
        onSnapshot,
        serverTimestamp,
        query,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore.js";
      import {
        getAuth,
        GoogleAuthProvider,
        signInWithPopup,
        signInWithRedirect,
        getRedirectResult,
        signOut,
        onAuthStateChanged,
        setPersistence,
        browserLocalPersistence,
      } from "https://www.gstatic.com/firebasejs/12.7.0/firebase-auth.js";

      // Your web app's Firebase configuration
      const firebaseConfig = {
        apiKey: "AIzaSyC3qGfZrKcsLWtP9j8CPObOWAAWhPfErzE",
        authDomain: "schedule-2cc39.firebaseapp.com",
        projectId: "schedule-2cc39",
        storageBucket: "schedule-2cc39.firebasestorage.app",
        messagingSenderId: "440549754838",
        appId: "1:440549754838:web:ed2c62e7316dfae4520677",
      };

      const isFirebaseConfigured = !Object.values(firebaseConfig).some(
        (value) => String(value).includes("YOUR_")
      );

      const pad = (n) => String(n).padStart(2, "0");
      const formatDateKey = (date) =>
        `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(
          date.getDate()
        )}`;

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
      let selectedDate = formatDateKey(today);
      let currentFilter = "all";
      let schedules = [];
      let currentUser = null;
      let unsubscribeSchedules = null;
      let db = null;
      let auth = null;

      const $ = (id) => document.getElementById(id);

      function setSyncState(state, text) {
        const dot = $("syncDot");
        const label = $("syncText");
        dot.className = `sync-dot ${state}`;
        label.textContent = text;
      }

      function updateAccountUI(user) {
        const loginBtn = $("loginBtn");
        const accountBox = $("accountBox");
        if (user) {
          loginBtn.hidden = true;
          accountBox.hidden = false;
          $("accountName").textContent =
            user.displayName || user.email || "로그인됨";
          $("accountPhoto").src = user.photoURL || "";
          $("accountPhoto").hidden = !user.photoURL;
        } else {
          loginBtn.hidden = false;
          accountBox.hidden = true;
        }
      }

      async function initializeFirebase() {
        if (!isFirebaseConfigured) {
          setSyncState("warning", "Firebase 설정 필요");
          $("loginBtn").disabled = true;
          $("loginBtn").title = "파일 안의 firebaseConfig를 먼저 입력하세요.";
          schedules = [];
          render();
          return;
        }

        try {
          const app = initializeApp(firebaseConfig);
          db = getFirestore(app);
          auth = getAuth(app);
          await setPersistence(auth, browserLocalPersistence);

          try {
            await getRedirectResult(auth);
          } catch (error) {
            console.error(error);
            if (error.code === "auth/unauthorized-domain") {
              setSyncState("error", "도메인 승인 필요");
            }
          }

          onAuthStateChanged(auth, (user) => {
            currentUser = user;
            updateAccountUI(user);

            if (unsubscribeSchedules) {
              unsubscribeSchedules();
              unsubscribeSchedules = null;
            }

            if (!user) {
              schedules = [];
              setSyncState("idle", "로그인 필요");
              render();
              return;
            }

            setSyncState("loading", "동기화 중");
            const schedulesRef = collection(db, "users", user.uid, "schedules");
            const schedulesQuery = query(
              schedulesRef,
              orderBy("startDate", "asc")
            );

            unsubscribeSchedules = onSnapshot(
              schedulesQuery,
              (snapshot) => {
                schedules = snapshot.docs.map((item) => ({
                  id: item.id,
                  ...item.data(),
                }));
                setSyncState("online", "실시간 동기화");
                render();
              },
              (error) => {
                console.error(error);
                setSyncState("error", "동기화 오류");
                alert(
                  "Firestore 데이터를 불러오지 못했습니다. 보안 규칙과 Firebase 설정을 확인하세요."
                );
              }
            );
          });
        } catch (error) {
          console.error(error);
          setSyncState("error", "연결 실패");
          alert(
            "Firebase 초기화에 실패했습니다. firebaseConfig 값을 확인하세요."
          );
        }
      }

      async function login() {
        if (!auth) return;

        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: "select_account" });

        try {
          setSyncState("loading", "로그인 중");

          const useRedirect =
            window.matchMedia("(max-width: 760px)").matches ||
            /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

          if (useRedirect) {
            await signInWithRedirect(auth, provider);
            return;
          }

          await signInWithPopup(auth, provider);
        } catch (error) {
          console.error(error);

          if (
            error.code === "auth/popup-blocked" ||
            error.code === "auth/operation-not-supported-in-this-environment"
          ) {
            await signInWithRedirect(auth, provider);
            return;
          }

          setSyncState("error", "로그인 실패");

          if (error.code === "auth/configuration-not-found") {
            alert(
              "Firebase Authentication이 아직 활성화되지 않았습니다. Firebase 콘솔에서 Authentication을 시작하고 Google 로그인 제공업체를 사용 설정하세요."
            );
          } else if (error.code === "auth/unauthorized-domain") {
            alert(
              "현재 도메인이 Firebase 승인 도메인에 없습니다. Authentication 설정의 승인된 도메인에 현재 사이트 도메인을 추가하세요."
            );
          } else if (error.code !== "auth/popup-closed-by-user") {
            alert(
              `Google 로그인에 실패했습니다.\n${error.code || error.message}`
            );
          }
        }
      }

      async function logout() {
        if (!auth) return;
        await signOut(auth);
      }

      function requireLogin() {
        if (currentUser) return true;
        alert("일정을 저장하려면 먼저 Google 계정으로 로그인하세요.");
        return false;
      }

      function parseLocalDate(dateString) {
        const [y, m, d] = dateString.split("-").map(Number);
        return new Date(y, m - 1, d);
      }

      function getVisibleSchedules() {
        return currentFilter === "all"
          ? schedules
          : schedules.filter((item) => item.type === currentFilter);
      }

      function occursOn(item, dateKey) {
        return item.startDate <= dateKey && item.endDate >= dateKey;
      }

      function render() {
        renderCalendar();
        renderSummary();
        renderSelectedList();
        renderDeadlineList();
        renderProgress();
      }

      function renderCalendar() {
        const grid = $("calendarGrid");
        grid.innerHTML = "";

        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        $("monthTitle").textContent = `${year}년 ${month + 1}월`;

        const first = new Date(year, month, 1);
        const start = new Date(year, month, 1 - first.getDay());
        const visible = getVisibleSchedules();

        for (let i = 0; i < 42; i++) {
          const date = new Date(start);
          date.setDate(start.getDate() + i);
          const key = formatDateKey(date);

          const day = document.createElement("div");
          day.className = "day";
          if (date.getMonth() !== month) day.classList.add("outside");
          if (key === formatDateKey(today)) day.classList.add("today");
          if (key === selectedDate) day.classList.add("selected");

          const number = document.createElement("div");
          number.className = "day-number";
          number.textContent = date.getDate();
          day.appendChild(number);

          const eventsWrap = document.createElement("div");
          eventsWrap.className = "day-events";

          const events = visible
            .filter((item) => occursOn(item, key))
            .sort((a, b) =>
              (a.startTime || "99:99").localeCompare(b.startTime || "99:99")
            );

          events.slice(0, 3).forEach((item) => {
            const eventBtn = document.createElement("button");
            eventBtn.className = `calendar-event ${item.type}`;
            eventBtn.textContent = `${
              item.startTime ? item.startTime + " " : ""
            }${item.title}`;
            eventBtn.title = item.title;
            eventBtn.addEventListener("click", (e) => {
              e.stopPropagation();
              openEditModal(item.id);
            });
            eventsWrap.appendChild(eventBtn);
          });

          if (events.length > 3) {
            const more = document.createElement("div");
            more.className = "more-count";
            more.textContent = `+${events.length - 3}개`;
            eventsWrap.appendChild(more);
          }

          day.appendChild(eventsWrap);
          day.addEventListener("click", () => {
            selectedDate = key;
            renderCalendar();
            renderSelectedList();
          });
          day.addEventListener("dblclick", () => openCreateModal(key));
          grid.appendChild(day);
        }
      }

      function renderSummary() {
        const todayKey = formatDateKey(today);
        const weekEnd = new Date(today);
        weekEnd.setDate(today.getDate() + 6);
        const weekEndKey = formatDateKey(weekEnd);
        const visible = getVisibleSchedules();

        const todayItems = visible.filter((item) => occursOn(item, todayKey));
        const weekWork = schedules.filter(
          (item) =>
            item.type === "work" &&
            item.startDate <= weekEndKey &&
            item.endDate >= todayKey
        );
        const projects = schedules.filter(
          (item) =>
            (item.type === "personal" || item.type === "loind") &&
            item.status !== "done"
        );

        const dueEnd = new Date(today);
        dueEnd.setDate(today.getDate() + 7);
        const dueEndKey = formatDateKey(dueEnd);
        const dueSoon = schedules.filter(
          (item) =>
            item.status !== "done" &&
            item.endDate >= todayKey &&
            item.endDate <= dueEndKey
        );

        $("todayCount").innerHTML = `${todayItems.length}<small>건</small>`;
        $("weekWorkCount").innerHTML = `${weekWork.length}<small>건</small>`;
        $("projectCount").innerHTML = `${projects.length}<small>건</small>`;
        $("dueSoonCount").innerHTML = `${dueSoon.length}<small>건</small>`;
      }

      function escapeHtml(text = "") {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function scheduleItemMarkup(item, contextDate) {
        const end = parseLocalDate(item.endDate);
        const diff = Math.ceil((end - today) / 86400000);
        const overdue = item.status !== "done" && diff < 0;
        const typeLabel =
          { work: "캐스트피아", personal: "개인", loind: "로인드" }[
            item.type
          ] || "기타";
        const statusLabel =
          { planned: "예정", progress: "진행 중", done: "완료" }[item.status] ||
          "예정";

        let dateText =
          item.startDate === item.endDate
            ? item.startDate.replaceAll("-", ".")
            : `${item.startDate.replaceAll(
                "-",
                "."
              )} ~ ${item.endDate.replaceAll("-", ".")}`;

        if (contextDate && occursOn(item, contextDate) && item.startTime) {
          dateText = `${item.startTime} · ${escapeHtml(
            item.location || dateText
          )}`;
        }

        return `
        <div class="schedule-item ${overdue ? "overdue" : ""}" data-id="${
          item.id
        }">
          <div class="schedule-meta">
            <span class="type-chip ${item.type}">${typeLabel}</span>
            <span>${dateText}</span>
            <span>· ${statusLabel}</span>
          </div>
          <div class="schedule-name">${escapeHtml(item.title)}</div>
          <button class="delete-mini" data-delete="${
            item.id
          }" aria-label="삭제">×</button>
        </div>`;
      }

      function bindListEvents(container) {
        container.querySelectorAll(".schedule-item").forEach((el) => {
          el.addEventListener("click", (e) => {
            if (e.target.dataset.delete) return;
            openEditModal(el.dataset.id);
          });
        });
        container.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            deleteSchedule(btn.dataset.delete);
          });
        });
      }

      function renderSelectedList() {
        const list = $("selectedList");
        const date = parseLocalDate(selectedDate);
        const label =
          selectedDate === formatDateKey(today)
            ? "오늘 일정"
            : `${date.getMonth() + 1}월 ${date.getDate()}일 일정`;
        const items = getVisibleSchedules()
          .filter((item) => occursOn(item, selectedDate))
          .sort((a, b) =>
            (a.startTime || "99:99").localeCompare(b.startTime || "99:99")
          );

        $("selectedTitle").textContent = label;
        $("selectedCount").textContent = `${items.length}건`;
        list.innerHTML = items.length
          ? items.map((item) => scheduleItemMarkup(item, selectedDate)).join("")
          : `<div class="empty">${
              currentUser
                ? "등록된 일정이 없습니다.<br>날짜를 더블클릭해 일정을 추가하세요."
                : "Google 로그인 후 일정을 등록할 수 있습니다."
            }</div>`;
        bindListEvents(list);
      }

      function renderDeadlineList() {
        const list = $("deadlineList");
        const todayKey = formatDateKey(today);
        const limit = new Date(today);
        limit.setDate(today.getDate() + 7);
        const limitKey = formatDateKey(limit);
        const items = getVisibleSchedules()
          .filter(
            (item) =>
              item.status !== "done" &&
              item.endDate >= todayKey &&
              item.endDate <= limitKey
          )
          .sort((a, b) => a.endDate.localeCompare(b.endDate));

        list.innerHTML = items.length
          ? items.map((item) => scheduleItemMarkup(item)).join("")
          : `<div class="empty">7일 안에 마감되는 일정이 없습니다.</div>`;
        bindListEvents(list);
      }

      function renderProgress() {
        const monthPrefix = `${viewDate.getFullYear()}-${pad(
          viewDate.getMonth() + 1
        )}`;
        const projects = schedules.filter(
          (item) =>
            (item.type === "personal" || item.type === "loind") &&
            (item.startDate.startsWith(monthPrefix) ||
              item.endDate.startsWith(monthPrefix))
        );
        const done = projects.filter((item) => item.status === "done").length;
        const percent = projects.length
          ? Math.round((done / projects.length) * 100)
          : 0;

        $("progressBar").style.width = `${percent}%`;
        $("progressText").textContent = `완료 ${done} / ${projects.length}`;
        $("progressPercent").textContent = `${percent}%`;
      }

      function openCreateModal(dateKey = formatDateKey(today)) {
        if (!requireLogin()) return;
        $("modalTitle").textContent = "새 일정 등록";
        $("scheduleForm").reset();
        $("scheduleId").value = "";
        $("startDate").value = dateKey;
        $("endDate").value = dateKey;
        $("status").value = "planned";
        $("modalWrap").classList.add("open");
        setTimeout(() => $("title").focus(), 20);
      }

      function openEditModal(id) {
        if (!requireLogin()) return;
        const item = schedules.find((schedule) => schedule.id === id);
        if (!item) return;
        $("modalTitle").textContent = "일정 수정";
        $("scheduleId").value = item.id;
        $("title").value = item.title;
        $("type").value = item.type;
        $("status").value = item.status;
        $("startDate").value = item.startDate;
        $("endDate").value = item.endDate;
        $("startTime").value = item.startTime || "";
        $("location").value = item.location || "";
        $("memo").value = item.memo || "";
        $("modalWrap").classList.add("open");
      }

      function closeModal() {
        $("modalWrap").classList.remove("open");
      }

      async function deleteSchedule(id) {
        if (!requireLogin() || !confirm("이 일정을 삭제할까요?")) return;
        try {
          setSyncState("loading", "저장 중");
          await deleteDoc(doc(db, "users", currentUser.uid, "schedules", id));
        } catch (error) {
          console.error(error);
          setSyncState("error", "삭제 실패");
          alert("일정을 삭제하지 못했습니다.");
        }
      }

      $("scheduleForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!requireLogin()) return;

        const id = $("scheduleId").value || crypto.randomUUID();
        const startDate = $("startDate").value;
        const endDate = $("endDate").value;
        if (endDate < startDate) {
          alert("종료일은 시작일보다 빠를 수 없습니다.");
          return;
        }

        const item = {
          title: $("title").value.trim(),
          type: $("type").value,
          status: $("status").value,
          startDate,
          endDate,
          startTime: $("startTime").value,
          location: $("location").value.trim(),
          memo: $("memo").value.trim(),
          updatedAt: serverTimestamp(),
        };

        try {
          setSyncState("loading", "저장 중");
          await setDoc(
            doc(db, "users", currentUser.uid, "schedules", id),
            item,
            { merge: true }
          );
          selectedDate = startDate;
          const parsed = parseLocalDate(startDate);
          viewDate = new Date(parsed.getFullYear(), parsed.getMonth(), 1);
          closeModal();
        } catch (error) {
          console.error(error);
          setSyncState("error", "저장 실패");
          alert(
            "일정을 저장하지 못했습니다. Firestore 보안 규칙을 확인하세요."
          );
        }
      });

      $("loginBtn").addEventListener("click", login);
      $("logoutBtn").addEventListener("click", logout);
      $("openModalBtn").addEventListener("click", () =>
        openCreateModal(selectedDate)
      );
      $("closeModalBtn").addEventListener("click", closeModal);
      $("cancelBtn").addEventListener("click", closeModal);
      $("modalWrap").addEventListener("click", (e) => {
        if (e.target.id === "modalWrap") closeModal();
      });
      $("prevMonth").addEventListener("click", () => {
        viewDate.setMonth(viewDate.getMonth() - 1);
        render();
      });
      $("nextMonth").addEventListener("click", () => {
        viewDate.setMonth(viewDate.getMonth() + 1);
        render();
      });
      $("goToday").addEventListener("click", () => {
        viewDate = new Date(today.getFullYear(), today.getMonth(), 1);
        selectedDate = formatDateKey(today);
        render();
      });

      document.querySelectorAll(".top-nav button").forEach((button) => {
        button.addEventListener("click", () => {
          document
            .querySelectorAll(".top-nav button")
            .forEach((btn) => btn.classList.remove("active"));
          button.classList.add("active");
          currentFilter = button.dataset.filter;
          render();
        });
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });
      $("todayText").textContent = new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long",
      }).format(today);

      const appHeader = document.querySelector(".app-header");
      let lastScrollY = window.scrollY;
      let ticking = false;
      function handleHeaderScroll() {
        const currentY = window.scrollY;
        appHeader.classList.toggle("header-solid", currentY > 16);
        appHeader.classList.toggle(
          "header-hidden",
          currentY > lastScrollY && currentY > 140
        );
        lastScrollY = currentY;
        ticking = false;
      }
      window.addEventListener("scroll", () => {
        if (!ticking) {
          window.requestAnimationFrame(handleHeaderScroll);
          ticking = true;
        }
      });

      render();
      initializeFirebase();
    </script>
  </body>
</html>
